name=MicroTaskX
version=3.1.1
author=Moaaz Yahia Shrif
maintainer=Moaaz <[EMAIL_ADDRESS]>
sentence=A modular micro-RTOS for Arduino with priority scheduling, task args, micros-precision timing, WDT, ISR queuing, coroutines, signals, mutexes, PID, Kalman, software PWM, rotary encoder, and rich hardware utilities.
paragraph=MicroTaskX v3.1 transforms Arduino into a high-efficiency micro-RTOS. Features: template-based priority scheduler with task arguments and microsecond precision, dynamic task management (add/remove/pause/resume/setInterval), one-shot tasks, task execution profiling, software watchdog timer (WDT), deferred ISR task queuing, cooperative coroutines and protothreads, inter-task signals and mutexes, real-time CPU usage monitoring, smart low-power sleep (AVR/ESP32), macro timers (MTX_EVERY_MS/HZ), EMA and moving-average analog smoothing, Kalman filter, software PWM, rotary encoder, PID controller with anti-windup, hysteresis logic, edge detection, long-press debouncing, battery percentage estimation, CRC8 checksum, time formatting, hex encoding, bit manipulation, LCD smart refresh, typewriter effect, and circular queue.
category=Timing
url=https://github.com/Moaaz-i/MicroTaskX
architectures=*
