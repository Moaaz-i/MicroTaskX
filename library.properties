sentence=A modular micro-RTOS and multitasking engine with a template priority scheduler, runtime task controls, and real-time CPU profiling.
paragraph=MicroTaskX transforms Arduino into a high-efficiency micro-RTOS. It provides a modular template-based background task scheduler, dynamic runtime task management, independent macro-based timers, isolated fast analog smoothing, smart power management (AVR/ESP32), and continuous CPU usage monitoring with near-zero overhead.
