sentence=An ultra-lightweight multitasking framework with real-time CPU profiling and a priority-based background scheduler.
paragraph=UMOZ transforms your Arduino environment into a micro-RTOS. It injects performance boosters directly into setup and loop, providing macro-driven timers, a priority-aware background task scheduler, high-speed direct port manipulation, smart analog smoothing, and continuous CPU usage monitoring with near-zero overhead.
