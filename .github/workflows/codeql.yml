name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          source-root: src

      # نخبر CodeQL أن compile_commands.json موجود
      - name: Provide compile commands
        run: |
          echo "Using compile_commands.json for CodeQL"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
