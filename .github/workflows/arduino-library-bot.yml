name: Arduino Library Autonomous Bot
run-name: 🤖 Autonomous Bot - ${{ github.event_name }} by @${{ github.actor }}

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # نستخدم head_ref في الـ PR لضمان التعديل على فرع المطور مباشرة
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          # نضمن جلب مستودع المطور الأصلي حتى لو كان Fork
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Welcome New Contributor
        if: github.event_name == 'pull_request' && github.event.action == 'opened'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 Welcome @${context.actor}! Thank you for contributing to MicroTaskX. Running automated formatting and quality checks now...`
            });

      - name: Run Code Formatter
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find . -iname '*.h' -o -iname '*.cpp' -o -iname '*.ino' | xargs -r clang-format -i

      - name: Check for Formatting Changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit & Push Formatting Changes Directly
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "style: automated code formatting by autonomous bot"
          git push

      - name: Comment on PR with Success Status
        if: github.event_name == 'pull_request' && steps.git-check.outputs.changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `🤖 **Update:** Code formatting rules applied and committed directly to your branch! Everything is neat and ready for review.`
            });
